<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка: JavaScript отключен</title>
    <style>
        /* Черный фон на весь экран */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Центрированный блок с красной обводкой */
        .error-box {
            border: 2px solid #ff0000;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            border-radius: 8px;
        }

        h1 {
            color: #ff4d4d;
            margin-top: 0;
        }

        p {
            line-height: 1.5;
            font-size: 1.1rem;
        }

        .btn-retry {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff0000;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="error-box">
        <h1>Ошибка доступа</h1>
        <p>Для работы с этим сайтом необходимо включить <strong>JavaScript</strong> в настройках вашего браузера.</p>
        <!-- Кнопка просто обновляет страницу, чтобы проверить включили ли JS -->
        <a href="index.html" class="btn-retry">Я включил, обновить</a>
    </div>

</body>
</html>
